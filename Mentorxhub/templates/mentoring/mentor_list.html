{% extends 'base.html' %}
{% load static %}

{% block title %}Nos Mentors - MentorXHub{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'mentoring/css/mentors_public.css' %}">
<style>
    /* Custom adjustments for the public page integration */
    .mentors-page {
        background: radial-gradient(at 0% 0%, rgba(67, 97, 238, 0.05) 0%, transparent 50%),
            radial-gradient(at 100% 100%, rgba(155, 93, 229, 0.05) 0%, transparent 50%),
            #f8fafc;
        min-height: calc(100vh - 64px);
        padding: 4rem 0;
    }

    [data-theme="dark"] .mentors-page {
        background: radial-gradient(at 0% 0%, rgba(67, 97, 238, 0.15) 0%, transparent 50%),
            radial-gradient(at 100% 100%, rgba(155, 93, 229, 0.1) 0%, transparent 50%),
            #0f172a;
    }

    .mentors-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 24px;
        width: 100%;
    }

    /* HTMX Transitions */
    .htmx-swapping #mentor-list-container {
        opacity: 0;
        transition: opacity 0.3s ease-out;
    }

    #mentor-list-container {
        transition: opacity 0.5s ease-in;
    }

    .htmx-indicator {
        opacity: 0;
        transition: opacity 0.2s ease-in;
    }

    .htmx-request .htmx-indicator {
        opacity: 1;
    }

    .htmx-request.filters-bar {
        pointer-events: none;
        opacity: 0.8;
    }
</style>
{% endblock %}

{% block content %}
<div class="mentors-page">
    {% include 'mentoring/fragments/mentor_list_ui.html' %}
</div>
{% endblock %}
