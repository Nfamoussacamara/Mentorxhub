{% extends 'base.html' %}
{% load static %}

{% block title %}Session: {{ session.title }} | MentorXHub{% endblock %}

{% block extra_css %}
<style>
    body, html {
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden !important;
    }
    .video-room-container {
        height: 100vh;
        width: 100%;
        display: flex;
        flex-direction: column;
    }
    .video-header {
        padding: 1rem;
        background: #fff;
        border-bottom: 1px solid #e5e7eb;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .back-btn {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        color: #4b5563;
        text-decoration: none;
        font-weight: 500;
        transition: color 0.2s;
    }
    .back-btn:hover {
        color: #111827;
    }
</style>
{% endblock %}

{% block content %}
<div class="video-room-container">
    <div id="jitsi-container" style="flex: 1; width: 100%;"></div>
</div>
{% endblock %}

{% block extra_js %}
<script src='https://meet.jit.si/external_api.js'></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const domain = 'meet.jit.si';
        const options = {
            roomName: '{{ room_name }}',
            width: '100%',
            height: '100%',
            parentNode: document.querySelector('#jitsi-container'),
            userInfo: {
                email: '{{ request.user.email }}',
                displayName: '{{ user_name|escapejs }}'
            },
            lang: 'fr',
            configOverwrite: { 
                startWithAudioMuted: false,
                startWithVideoMuted: false,
                prejoinPageEnabled: true,
                disableDeepLinking: true,
                disableThirdPartyRequests: false
            },
            interfaceConfigOverwrite: { 
                SHOW_JITSI_WATERMARK: false,
                SHOW_WATERMARK_FOR_GUESTS: false,
                TOOLBAR_BUTTONS: [
                    'microphone', 'camera', 'closedcaptions', 'desktop', 'fullscreen',
                    'fodeviceselection', 'hangup', 'profile', 'chat', 'recording',
                    'livestreaming', 'etherpad', 'sharedvideo', 'settings', 'raisehand',
                    'videoquality', 'filmstrip', 'invite', 'feedback', 'stats', 'shortcuts',
                    'tileview', 'videobackgroundblur', 'download', 'help', 'mute-everyone',
                    'security'
                ]
            }
        };
        const api = new JitsiMeetExternalAPI(domain, options);
        
        // Redirection quand l'utilisateur raccroche
        api.addEventListeners({
            videoConferenceLeft: function () {
                window.location.href = "{% url 'dashboard:session_detail' session.id %}";
            },
            readyToClose: function () {
                window.location.href = "{% url 'dashboard:session_detail' session.id %}";
            }
        });
    });
</script>
{% endblock %}
