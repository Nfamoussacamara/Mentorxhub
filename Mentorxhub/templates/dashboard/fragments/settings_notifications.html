<div class="settings-section">
    <h2>Préférences de Notifications</h2>
    
    <form id="notifications-settings-form" class="settings-form">
        {% csrf_token %}
        
        <div class="form-group">
            <label class="checkbox-label">
                <input type="checkbox" name="email_notifications" checked>
                <span>Notifications par email</span>
            </label>
            <small class="form-help">Recevoir des notifications par email</small>
        </div>
        
        <div class="form-group">
            <label class="checkbox-label">
                <input type="checkbox" name="session_reminders" checked>
                <span>Rappels de sessions</span>
            </label>
            <small class="form-help">Recevoir des rappels 24h avant une session</small>
        </div>
        
        <div class="form-group">
            <label class="checkbox-label">
                <input type="checkbox" name="new_messages" checked>
                <span>Nouveaux messages</span>
            </label>
            <small class="form-help">Être notifié des nouveaux messages</small>
        </div>
        
        <div class="form-group">
            <label class="checkbox-label">
                <input type="checkbox" name="session_updates" checked>
                <span>Mises à jour de sessions</span>
            </label>
            <small class="form-help">Notifications pour les changements de sessions</small>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i>
                Enregistrer les préférences
            </button>
        </div>
    </form>
</div>
